name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            file

      - name: Determine next version
        id: version
        run: |
          git fetch --tags
          LATEST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [ -n "$LATEST_TAG" ]; then
            CURRENT="${LATEST_TAG#v}"
          else
            CURRENT=$(node -p "require('./src-tauri/tauri.conf.json').version")
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

          for f in package.json src-tauri/tauri.conf.json; do
            node -e "
              const fs = require('fs');
              const json = JSON.parse(fs.readFileSync('$f', 'utf8'));
              json.version = '$NEXT';
              fs.writeFileSync('$f', JSON.stringify(json, null, 2) + '\n');
            "
          done

      - name: Install frontend dependencies
        run: bun install

      - name: Build and bundle
        run: bun run tauri build

      - name: Generate checksums
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          (
            cd "$BUNDLE_DIR"
            : > SHA256SUMS
            for f in deb/*.deb appimage/*.AppImage rpm/*.rpm; do
              sha256sum "$f" | awk -v name="$(basename "$f")" '{print $1"  "name}' >> SHA256SUMS
            done
          )

      - name: Commit version bump to a release branch
        id: branch
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v${VERSION}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.lock
          git commit -m "chore: release v${VERSION} [skip ci]"
          git push origin "$BRANCH"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Open release PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="${{ steps.branch.outputs.name }}"
          if ! gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "chore: release v${VERSION} [skip ci]" \
              --body "Automated version bump for v${VERSION}. The tag and GitHub release (with binaries) are already published from this branch; merging this PR just brings master's version files up to date."
          fi

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            "$BUNDLE_DIR"/deb/*.deb \
            "$BUNDLE_DIR"/appimage/*.AppImage \
            "$BUNDLE_DIR"/rpm/*.rpm \
            "$BUNDLE_DIR"/SHA256SUMS
